<script>
  
  function parseDDMMYYYYToTimestamp(value) {
  if (value == null) return null;

  // If ag-Grid already provides a Date or a timestamp
  if (value instanceof Date && !isNaN(value)) return value.getTime();
  if (typeof value === 'number' && isFinite(value)) return value;

  const v = String(value).trim();
  if (!v) return null;

  // Split possible date/time (supports "yyyy-mm-ddTHH:mm:ssZ" and "dd/mm/yyyy HH:mm:ss")
  const [datePartRaw, timePartRaw] = v.split(/\s+/);
  const datePart = datePartRaw;
  const timePart = timePartRaw || '';

  // 1) ISO / RFC formats: let the browser parse them ("2026-02-13", "2026-02-13T00:00:00Z")
  if (/^\d{4}[-/]\d{2}[-/]\d{2}/.test(datePart) || v.includes('T')) {
    const t = Date.parse(v);
    if (!isNaN(t)) return t;
  }

  const mNameMatch = /^([0-3]?\d)[-/]([A-Za-z]{3,})[-/](\d{2,4})$/.exec(datePart);
  if (mNameMatch) {
    const dd2 = Number(mNameMatch[1]);
    const monStr = mNameMatch[2].slice(0,3).toLowerCase();
    const yyyy2raw = Number(mNameMatch[3]);
    const monthMap = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const mm2 = monthMap[monStr];
    const yyyy2 = (yyyy2raw < 100) ? (2000 + yyyy2raw) : yyyy2raw;
    if (mm2 && yyyy2 >= 1000) {
      const d2 = new Date(yyyy2, mm2-1, dd2);
      if (d2.getFullYear() === yyyy2 && d2.getMonth() === (mm2-1) && d2.getDate() === dd2) {
        return d2.getTime();
      }
    }
  }

  // 2) dd/mm/yyyy or dd-mm-yyyy (optionally with time)
  const sep = datePart.includes('/') ? '/' : (datePart.includes('-') ? '-' : null);
  if (!sep) return null;

  const parts = datePart.split(sep);
  if (parts.length !== 3) return null;

  let dd, mm, yyyy;

  // If first token is 4 digits, treat as yyyy-mm-dd
  if (parts[0].length === 4) {
    yyyy = Number(parts[0]);
    mm = Number(parts[1]);
    dd = Number(parts[2]);
  } else {
    dd = Number(parts[0]);
    mm = Number(parts[1]);
    yyyy = Number(parts[2]);
  }

  if (![dd, mm, yyyy].every(Number.isFinite)) return null;
  if (yyyy < 1000 || mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;

  let hh = 0, min = 0, ss = 0;
  if (timePart) {
    const t = timePart.split(':');
    hh = Number(t[0] ?? 0);
    min = Number(t[1] ?? 0);
    ss = Number(t[2] ?? 0);
    if ([hh, min, ss].some(n => !Number.isFinite(n))) return null;
  }

  const d = new Date(yyyy, mm - 1, dd, hh, min, ss);
  // Reject invalid calendar dates like 31/02/2026
  if (d.getFullYear() !== yyyy || d.getMonth() !== (mm - 1) || d.getDate() !== dd) return null;
  return d.getTime();
}


  function ddmmyyyySortComparator(valueA, valueB) {
    const a = parseDDMMYYYYToTimestamp(valueA);
    const b = parseDDMMYYYYToTimestamp(valueB);

    if (a == null && b == null) return 0;
    if (a == null) return 1;   // nulls last
    if (b == null) return -1;
    return a - b;
  }


  function ddmmyyyyFilterComparator(filterLocalDateAtMidnight, cellValue) {
    const ts = parseDDMMYYYYToTimestamp(cellValue);
    if (ts == null) return -1;

    const d = new Date(ts);
    const cellMidnight = new Date(d.getFullYear(), d.getMonth(), d.getDate());

    if (cellMidnight < filterLocalDateAtMidnight) return -1;
    if (cellMidnight > filterLocalDateAtMidnight) return 1;
    return 0;
  }


  function makeDDMMYYYYDateColDef(baseColDef = {}) {
  return {
    ...baseColDef,
    sortable: true,
    valueGetter: (params) => params.data ? params.data[baseColDef.field] : params.value,
      filter: 'agDateColumnFilter',
      comparator: ddmmyyyySortComparator,
      filterParams: {
        comparator: ddmmyyyyFilterComparator,
        browserDatePicker: true,
        buttons: ['reset', 'apply'],
      },
    };
  }


  function onBtnTableExport() {
    var params = {
      fileName: 'Pipeline Details.csv',
    };
    tableApi.exportDataAsCsv(params);
  }
  var tooltipRenderer = function(params)
  {
      return '<span title="' + params.value + '">'+params.value+'</span>';
  };
  tableData = JSON.parse(`{{ tableData|escapejs }}`);
  col_header = JSON.parse(`{{ col_header|escapejs }}`);

const explicitDateCols = new Set(['Created Date', 'CreatedDate', 'CloseDate', 'Close Date']);
const isDateCol = (colName) => {
  const c = String(colName || '').toLowerCase();
  return c.includes('date') || explicitDateCols.has(colName);
};

  columnDefs = [];
  const excluded = new Set(['CloseQtr', 'Close Year', 'Cycle time']);
  for (const col of col_header) {
    if (excluded.has(col)) continue;
    const baseDef = {
      headerName: col,
      field: col,
      width:
        col === 'Account Name' || col === 'Opportunity Name' ? 315 :
        col === 'BU' ? 100 :
        col === 'TCV' ? 100 :
        col === 'WinZone Opportunity ID' ? 130 :
        col === 'Win Probability (%)' ? 130 :
        col === 'Deal Duration (Months)' ? 130 : 100,
      headerTooltip: col,
      cellRenderer: tooltipRenderer,
    };

    columnDefs.push(
      isDateCol(col) ? makeDDMMYYYYDateColDef(baseDef) : baseDef
    );
  }

  options = {
    rowData: tableData,
    columnDefs:columnDefs,
    // domLayout:'autoHeight',
    // onGridReady: function (params) {
    //   params.api.sizeColumnsToFit();
    // },
    defaultColDef: {
      filter: true,
      editable: true,
      sortable: true,
    },
  }
  document.addEventListener("DOMContentLoaded", function () {
    tableApi = agGrid.createGrid(document.querySelector("#pipeline-table"), options);
  })
</script>

  const listOfDrawerDropdownElements = listOfDrawerDropdownIds.map((id) => $(id));

  const equalsAll = (value) => value === 'All';

  const compareStringsIgnoreCaseFn = (x, y) => {
    x = x.toLowerCase();
    y = y.toLowerCase();
    if (x < y) return -1;
    if (x > y) return 1;
    return 0;
  };

  // Custom sort order for Market Units
  const marketUnitOrder = ['UK&I', 'Southern Europe & Middle East', 'Northern Europe', 'DACH', 'EMEA Others', 'CE Others'];
  
  const compareMarketUnitsFn = (x, y) => {
    const indexX = marketUnitOrder.indexOf(x);
    const indexY = marketUnitOrder.indexOf(y);
    
    // If both are in the defined order, sort by their index
    if (indexX !== -1 && indexY !== -1) {
      return indexX - indexY;
    }
    // If only x is in the order, it comes first
    if (indexX !== -1) return -1;
    // If only y is in the order, it comes first
    if (indexY !== -1) return 1;
    // If neither is in the order, sort alphabetically
    return compareStringsIgnoreCaseFn(x, y);
  };

  function buildDrawerDropdowns(selectedValuesList) {
    // creating unique lists i.e. sets for options out of filtered dropdown data
    const optionLists = new Array(listOfDrawerDropdownIds.length)
      .fill(0)
      .map((_) => new Set());

    for (let i = 0; i < listOfDrawerDropdownIds.length; i++) {
      
      rawDrawerDropdownData.forEach((row) => {
        let result = true;
        // looping from 1st dropdown to all the way to current dropdown's previous dropdown
        for (let j = 0; j < i; j++) {
         
          result &&= selectedValuesList[j].includes("All")
            ? true
            : selectedValuesList[j].includes(row[j])
        }

        if (result) optionLists[i].add(row[i]);
        
      });
    }
    // sorting the filtered data, removing falsy values, adding All at the start of the lists
    for (let i = 0; i < listOfDrawerDropdownIds.length; i++) {
      optionLists[i] = [...optionLists[i]]
        .filter((v) => v)
        .sort(i === 0 ? compareMarketUnitsFn : compareStringsIgnoreCaseFn); // Use custom sort for Market Unit (index 0)
      optionLists[i].unshift('All');
    }
    // inserting the generated dropdown data as options into the dom
    listOfDrawerDropdownElements.forEach((element, index) => { 
      element.empty();
      optionLists[index].forEach((optionText, id) => {
        if(selectedValuesList[index].includes(optionText)){
          element.append(
              new Option(
                optionText,
                optionText,
                false,
                true
              )
          )
        }
        else{
          element.append(
            new Option(
              optionText,
              optionText,
              false,
              false
            )
          )
        }
      }
      );
    });
    market_units = optionLists[0]
  }

              <label style="font-size: 0.9rem;" class="form-check-label me-2">${market_units[i]}</label></span>`
             template = template + checkbox_label

<div id="gotoTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'});document.documentElement.scrollTop=0;document.body.scrollTop=0;" title="Back to top" style="position:fixed!important;right:24px!important;bottom:24px!important;z-index:999999!important;width:44px;height:44px;display:none;align-items:center;justify-content:center;font-size:18px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.45);padding:0;background-color:#0b3d91;color:#fff;border:none;cursor:pointer;">
  <i class="fas fa-chevron-up" style="margin:0;pointer-events:none;"></i>
</div>
<script>
(function(){
  var el=document.getElementById('gotoTopBtn');
  if(!el)return;
  function ck(){
    try{
      var s=Math.max(window.pageYOffset||0,document.documentElement.scrollTop||0,document.body.scrollTop||0);
      el.style.display=s>300?'flex':'none';
    }catch(e){el.style.display='flex';}
  }
  window.addEventListener('scroll',ck);
  document.addEventListener('scroll',ck);
  if(window.jQuery){$(window).on('scroll',ck);}
  setInterval(ck,400);
  ck();
})();
</script>
