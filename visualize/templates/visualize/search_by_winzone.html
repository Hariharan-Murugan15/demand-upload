<style>

  text-align: center;
  padding: 2px;
}
.dfstyle {
    font-size: 11pt; 
    font-family: Arial;
    border-collapse: collapse; 
    border: 1px solid silver;
    background-color:lightgray;

}

.dfstyle td, th {
    padding: 5px;
}

.dfstyle tr:nth-child(even) {
    background: #E0E0E0;
}

.dfstyle tr:hover {
    background: silver;
    cursor: pointer;
}

        <br>
        <label style="color:whitesmoke;">Pipeline Data label  :   </label>

            <select name="idx_label">

                {%  if entry_0 == idx_label_selected    %}
                  <option value="{{ entry_0 }}" selected>{{ entry_0 }} </option>

                  <option value="{{ entry_0 }}">{{ entry_0 }} </option>

              {% endfor %}
          </select>
          <br>
          <br>
        <font color="lightyellow">
            <label for="fname">Winzone Opportunity ID:</label>
            <input style="color:black;" type="text" id="winzone_id" name="winzone_id">

        <br>
        <br>
        <input type="submit" value="Refresh Dashboard" class="btn btn-primary">
        <a href="{% url 'home' %}" class="btn btn-warning"> Home</a>
    </form>
