<style>
  table {
    background-color: rgb(151, 151, 150);

  }

  table.table1 {

  }

    font-size: 13px;

<style>

    margin: 0 5px;
    padding: 10px;

<style>
  .ag-header-cell, .ag-header-group-cell{
    background-color: #4472c4 !important;
    color:white;
  }
  .ag-paging-panel{
    background-color: #4472c4 !important;
  }
  .ag-row{
    background-color: #d9e2f3 !important;
  }
  .ag-cell{
    padding: 0px !important;
    margin: 2px !important;
  }
  .ag-icon-menu {
    color:white !important;
  }
  .ag-header-cell-label {
    overflow: visible !important;
    white-space: normal !important;
    padding-right: 0px !important;
    text-overflow: initial !important;
    text-align: center  !important;
    justify-content: center !important;
  }
  .switch {
    position: relative;
    display: inline-block;
    width: 30px;
    height: 18px;
  }
  
  .switch input { 
    opacity: 0;
    width: 0;
    height: 0;
  }
  
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: white;
    -webkit-transition: .4s;
    transition: .4s;
  }
  
  .slider:before {
    position: absolute;
    content: "";
    height: 19px;
    width: 20px;
    /* left: 4px;
    bottom: 4px; */
    background-color: #2196F3;
    -webkit-transition: .4s;
    transition: .4s;
  }
  
  /* input:checked + .slider {
    background-color: #2196F3;
  } */
  
  input:focus + .slider {
    box-shadow: 0 0 1px #2196F3;
  }
  
  input:checked + .slider:before {
    -webkit-transform: translateX(12px);
    -ms-transform: translateX(12px);
    transform: translateX(12px);
  }
  
  /* Rounded sliders */
  .slider.round {
    border-radius: 20px;
  }
  
  .slider.round:before {
    border-radius: 50%;
  }
</style>

<script>
  var tooltipRenderer = function(params)
  {
      return '<span title="' + params.value + '">'+params.value+'</span>';
  };
  
  function onDealsTableExport() {
    var params = {
      fileName: 'Deals in Pipeline.csv',
    };
    dealsApi.exportDataAsCsv(params);
  }
  function onCloseQtrTableExport() {
    var params = {
      fileName: 'Pipeline BU by Close Qtr.csv',
    };
    closeQtrApi.exportDataAsCsv(params);
  }
  tableData = JSON.parse(`{{ tableData|escapejs }}`);
  columnDefs1 = [];
  for(col of ['WinZone Opportunity ID','Account Name','Opportunity Name','Vertical','Sales Stage','DealSize','TCV','SBU1','BU']){
    columnDefs1.push({
      headerName:col=='TCV'?'TCV ($m)':col,
      field: col,
      width: col=='Account Name'||col=='Opportunity Name'?310:col=='WinZone Opportunity ID'?150:col=='TCV'||col=='Sales Stage'||col=='BU'?100:150,
      headerTooltip:col,
      cellRenderer: tooltipRenderer,
    })
  }
  optionsSS1 = {
    rowData: tableData,
    columnDefs:columnDefs1,
    // domLayout:'autoHeight',
    onGridReady: function (params) {
      params.api.sizeColumnsToFit();
    },
    defaultColDef: {
      filter: true,
      editable: true,
    },
  }
  document.addEventListener("DOMContentLoaded", function () {
    dealsApi = agGrid.createGrid(document.querySelector("#byDealsTable"), optionsSS1);
  })

  tableData2 = JSON.parse(`{{ tableData2|escapejs }}`);
  columnDefs2 = [];
  for(col of ['Vertical','Region','CloseQtr','BU','WinZone Opportunity ID','TCV']){
    columnDefs2.push({
      headerName:col=='TCV'?'TCV ($m)':col=='WinZone Opportunity ID'?'Deals':col,
      field: col,
      width: col=='Vertical'?170:col=='Region'||col=='CloseQtr'?120:100,
      headerTooltip:col,
      cellRenderer: tooltipRenderer,
    })
  }
  optionsSS2 = {
    rowData: tableData2,
    columnDefs:columnDefs2,
    // domLayout:'autoHeight',
    onGridReady: function (params) {
      params.api.sizeColumnsToFit();
    },
    defaultColDef: {
      filter: true,
      editable: true,
    },
  }
  document.addEventListener("DOMContentLoaded", function () {
    closeQtrApi = agGrid.createGrid(document.querySelector("#byCloseQtrTable"), optionsSS2);
  })
</script>
<script>
  tableData = JSON.parse(`{{ tableData|escapejs }}`);
var xValues = tableData.map(item => item['BU']);
var yValues = tableData.map(item => item['TCV']);
var salesStages = tableData.map(item => item['DealSize']);

// Calculating marker sizes based on TCV values
var maxTCV = Math.max(...yValues);
var minTCV = Math.min(...yValues);
var markerSizes = yValues.map(tcv => 5 + 20 * ((tcv - minTCV) / (maxTCV - minTCV))); // Adjust the multiplier and offset as needed

// Creating trace for each sales stage with custom marker size
var tracesdealsInPipeline = [];
var salesStageValues = [...new Set(salesStages)]; // Unique sales stage values
salesStageValues = salesStageValues.sort();
salesStageValues.forEach((stage, index) => {
  var filteredData = tableData.filter(item => item['DealSize'] === stage);
  tracesdealsInPipeline.push({
    x: filteredData.map(item => item['BU']),
    y: filteredData.map(item => item['TCV']),
    mode: 'markers',
    type: 'scatter',
    name: stage,
    marker: {
      size: markerSizes.filter((_, i) => salesStages[i] === stage), // Set the marker size for this sales stage
      line: { width: 0 }
    },
    hovertemplate: '<b>DealSize</b>: %{text[0]}<br>' +
                   '<b>Sales Stage</b>: %{text[1]}<br>' +
                   '<b>BU</b>: %{text[2]}<br>' +
                   '<b>TCV</b>: %{text[3]}<br>' +
                   '<b>Opportunity Name</b>: %{text[4]}<br>' +
                   '<b>Account Name</b>: %{text[5]}<br>' +
                   '<b>Winzone Opportunity ID</b>: %{text[6]}<br>' +
                   '<b>Vertical</b>: %{text[7]}<br>',
    text: filteredData.map(item => [
      item['DealSize'],
      item['Sales Stage'],
      item['BU'],
      item['TCV'].toLocaleString("en-US"),
      item['Opportunity Name'],
      item['Account Name'],
      item['WinZone Opportunity ID'],
      item['Vertical']
    ])
  });
});

// Define layout
var layoutbysbuDealSize = {
  title: 'Deals in Pipeline',
  xaxis: {
    title: 'BU'
  },
  yaxis: {
    title: 'TCV'
  },
  legend: {
    title: { text: 'Deal Size' }
  },
  plot_bgcolor: 'black',
  paper_bgcolor: 'black',
  font: {
    color: '#fff'
  },
  width: 1125,
  height: 700
};

// Plotting the chart
Plotly.newPlot('bysbuDealSize', tracesdealsInPipeline, layoutbysbuDealSize).then(function (gd) {
  var modebar = gd.querySelector('.modebar-container');
  if (modebar) {
    var buttonsHtml = `
    <div style="display:flex;justify-content:flex-start;margin-left:20px">
      <div class="modebar-btn" style="font-size:10px" onclick="setZoombysbuDealSize('bysbuDealSize', 'all')">
        <div class="data-limit-circle"><div style="margin:3px;font-size:10px">All</div></div>
      </div>
      <div class="modebar-btn" style="font-size:10px" onclick="setZoombysbuDealSize('bysbuDealSize', 10)">
        <div class="data-limit-circle"><div style="margin:3px;font-size:10px">10</div></div>
      </div>
      <div class="modebar-btn" style="font-size:10px" onclick="setZoombysbuDealSize('bysbuDealSize', 25)">
        <div class="data-limit-circle"><div style="margin:3px;font-size:10px">25</div></div>
      </div>
      <div class="modebar-btn" style="font-size:10px" onclick="setZoombysbuDealSize('bysbuDealSize', 50)">
        <div class="data-limit-circle"><div style="margin:3px;font-size:10px">50</div></div>
      </div>
      <div class="modebar-btn" style="font-size:10px" onclick="setZoombysbuDealSize('bysbuDealSize', 100)">
        <div class="data-limit-circle"><div style="margin:3px;font-size:10px">100</div></div>
      </div>
      <div class="modebar-btn" style="font-size:10px" onclick="setZoombysbuDealSize('bysbuDealSize', 200)">
        <div class="data-limit-circle"><div style="margin:3px;font-size:10px">200</div></div>
      </div>
      <div class="modebar-btn" style="font-size:10px" onclick="setZoombysbuDealSize('bysbuDealSize', 300)">
        <div class="data-limit-circle"><div style="margin:3px;font-size:10px">300</div></div>
      </div>
    </div>
    `;
    modebar.insertAdjacentHTML('beforeend', buttonsHtml);

    setZoombysbuDealSize('bysbuDealSize', 'all');
    highlightIconsbubySS('bysbuDealSize', 'all');
  } else {
    console.error('Modebar not found');
  }
});
function setZoombysbuDealSize(chartId, limit) {
  const gd = document.getElementById(chartId);

  if (limit === 'all') {
    Plotly.react(gd, tracesdealsInPipeline, layoutbysbuDealSize);
  } else {
    // Step 1: Aggregate total TCV by BU
    const tcvByBU = {};
    tableData.forEach(item => {
      const bu = item['BU'];
      if (!tcvByBU[bu]) tcvByBU[bu] = 0;
      tcvByBU[bu] += item['TCV'];
    });

    // Step 2: Get top N BUs with highest total TCV
    const topBUs = Object.entries(tcvByBU)
      .sort((a, b) => b[1] - a[1])
      .slice(0, limit)
      .map(([bu]) => bu);
    const topBUSet = new Set(topBUs);

    // Step 3: Filter the traces using top BUs
    const filteredTraces = salesStageValues.map(stage => {
      const filteredStageData = tableData.filter(
        item => item['DealSize'] === stage && topBUSet.has(item['BU'])
      );

      return {
        x: filteredStageData.map(item => item['BU']),
        y: filteredStageData.map(item => item['TCV']),
        mode: 'markers',
        type: 'scatter',
        name: stage,
        marker: {
          size: filteredStageData.map(item => {
            return 5 + 20 * ((item['TCV'] - minTCV) / (maxTCV - minTCV));
          }),
          line: { width: 0 }
        },
        hovertemplate: '<b>DealSize</b>: %{text[0]}<br>' +
                       '<b>Sales Stage</b>: %{text[1]}<br>' +
                       '<b>BU</b>: %{text[2]}<br>' +
                       '<b>TCV</b>: %{text[3]}<br>' +
                       '<b>Opportunity Name</b>: %{text[4]}<br>' +
                       '<b>Account Name</b>: %{text[5]}<br>' +
                       '<b>Winzone Opportunity ID</b>: %{text[6]}<br>' +
                       '<b>Vertical</b>: %{text[7]}<br>',
        text: filteredStageData.map(item => [
          item['DealSize'],
          item['Sales Stage'],
          item['BU'],
          item['TCV'].toLocaleString("en-US"),
          item['Opportunity Name'],
          item['Account Name'],
          item['WinZone Opportunity ID'],
          item['Vertical']
        ])
      };
    });

    Plotly.react(gd, filteredTraces, layoutbysbuDealSize);
  }

  highlightIconsbubySS(chartId, limit);
}

function highlightIconsbubySS(chartID, id) {
  var chart = document.getElementById(chartID);
  chart.querySelectorAll('.data-limit-circle').forEach(btn => {
    btn.classList.remove('highlight');
  });

  var targetButton;
  if (id === 'all') {
    targetButton = Array.from(chart.querySelectorAll('.data-limit-circle')).find(btn =>
      btn.querySelector('div') && btn.querySelector('div').textContent.includes("All")
    );
  } else {
    targetButton = Array.from(chart.querySelectorAll('.data-limit-circle')).find(btn =>
      btn.querySelector('div') && btn.querySelector('div').textContent.includes(id)
    );
  }

  if (targetButton) {
    targetButton.classList.add('highlight');
  }
}

<script>
  // Parse the data
tableData2 = JSON.parse(`{{ tableData2|escapejs }}`);
var stages = [...new Set(tableData2.map(entry => entry['BU']))];
stages = stages.sort()
var dataByStage = [];
var sortedCloseQtr = [];

// Process data by stage
stages.forEach((stage) => {
  var filteredData = tableData2.filter(item => item['BU'] === stage);
  filteredData.sort((a, b) => {
    let [aYear, aQtr] = a['CloseQtr'].split('_Q');

    aYear = parseInt(aYear);
    bYear = parseInt(bYear);
    aQtr = parseInt(aQtr);
    bQtr = parseInt(bQtr);
    return aYear === bYear ? aQtr - bQtr : aYear - bYear;
  });

    x: filteredData.map(entry => entry['CloseQtr']),
    y: filteredData.map(entry => entry['TCV']),

      entry['TCV'].toLocaleString("en-US"),
      entry['WinZone Opportunity ID'],
      entry['Vertical']
    ]),
  });

  filteredData.forEach(entry => {
    if (!sortedCloseQtr.includes(entry['CloseQtr'])) {
      sortedCloseQtr.push(entry['CloseQtr']);
    }
  });
});

function setZoombysbuQtr(chartId, limit) {
  const gd = document.getElementById(chartId);

  if (limit === 'all') {
    Plotly.react(gd, dataByStage, layoutbysbuQtr);
  } else {
    // Step 1: Aggregate total TCV per CloseQtr
    const tcvByQtr = {};
    tableData2.forEach(item => {
      const qtr = item['CloseQtr'];
      if (!tcvByQtr[qtr]) tcvByQtr[qtr] = 0;
      tcvByQtr[qtr] += item['TCV'];
    });

    // Step 2: Get top N quarters by TCV
    const topQtrs = Object.entries(tcvByQtr)
      .sort((a, b) => b[1] - a[1])
      .slice(0, limit)
      .map(([qtr]) => qtr);
    const topQtrSet = new Set(topQtrs);

    // Step 3: Filter data traces based on top quarters
    const filteredTraces = dataByStage.map(trace => {
      const filteredIndices = trace.x
        .map((xValue, index) => topQtrSet.has(xValue) ? index : -1)
        .filter(index => index !== -1);

      return {
        ...trace,
        x: filteredIndices.map(i => trace.x[i]),
        y: filteredIndices.map(i => trace.y[i]),
        customdata: filteredIndices.map(i => trace.customdata[i])
      };
    });


    Plotly.react(gd, filteredTraces, layoutbysbuQtr);
  }

  highlightIconsbysbuQtr(chartId, limit);
}

  const rawDrawerDropdownData = JSON.parse(`{{ resultDepData|escapejs }}`);

  const selectedDrawerValuesList = [
    result,
    `{{ selected_bu }}`,
    `{{ selected_sbu }}`,
  ];
  const listOfDrawerDropdownIds = [
    '#unq_region',
    '#unique_mcu',
    '#unique_sbu',
  ];


  const listOfDrawerDropdownElements = listOfDrawerDropdownIds.map((id) => $(id));

  const equalsAll = (value) => value === 'All';

  const compareStringsIgnoreCaseFn = (x, y) => {
    x = x.toLowerCase();
    y = y.toLowerCase();
    if (x < y) return -1;
    if (x > y) return 1;
    return 0;
  };

  const marketUnitOrder = ['UK&I', 'Southern Europe & Middle East', 'Northern Europe', 'DACH', 'EMEA Others', 'CE Others'];
  const compareMarketUnitsFn = (x, y) => {
    const indexX = marketUnitOrder.indexOf(x);
    const indexY = marketUnitOrder.indexOf(y);
    if (indexX !== -1 && indexY !== -1) return indexX - indexY;
    if (indexX !== -1) return -1;
    if (indexY !== -1) return 1;
    return compareStringsIgnoreCaseFn(x, y);
  };

  function buildDrawerDropdowns(selectedValuesList) {
    // creating unique lists i.e. sets for options out of filtered dropdown data
    const optionLists = new Array(listOfDrawerDropdownIds.length)
      .fill(0)
      .map((_) => new Set());

    for (let i = 0; i < listOfDrawerDropdownIds.length; i++) {
      
      rawDrawerDropdownData.forEach((row) => {
        let result = true;
        // looping from 1st dropdown to all the way to current dropdown's previous dropdown
        for (let j = 0; j < i; j++) {
         
          result &&= selectedValuesList[j].includes("All")
            ? true
            : selectedValuesList[j].includes(row[j])
        }

        if (result) optionLists[i].add(row[i]);
        
      });
    }
    // sorting the filtered data, removing falsy values, adding All at the start of the lists
    for (let i = 0; i < listOfDrawerDropdownIds.length; i++) {
      optionLists[i] = [...optionLists[i]]
        .filter((v) => v)
        .sort(i === 0 ? compareMarketUnitsFn : compareStringsIgnoreCaseFn);
      optionLists[i].unshift('All');
    }
    // inserting the generated dropdown data as options into the dom
    listOfDrawerDropdownElements.forEach((element, index) => { 
      element.empty();
      optionLists[index].forEach((optionText, id) => {
        if(selectedValuesList[index].includes(optionText)){
          element.append(
              new Option(
                optionText,
                optionText,
                false,
                true
              )
          )
        }
        else{
          element.append(
            new Option(
              optionText,
              optionText,
              false,
              false
            )
          )
        }
      }
      );
    });
    market_units = optionLists[0]
  }

    let template = ""

            let checkbox_label = `<span><input class="form-check-input market_unit_option" type="checkbox" name="unq_region[]" value='${market_units[i]}' checked onchange='change_market_unit(this)'>
              <label style="font-size: 0.9rem;" class="form-check-label me-2">${market_units[i]}</label></span>`
             template = template + checkbox_label

          else{
            let selected_market_array = selected_market.split(',')
            if(selected_market_array.includes(market_units[i])){

              <label style="font-size: 0.9rem;" class="form-check-label me-2">${market_units[i]}</label></span>`

            }

              <label style="font-size: 0.9rem;" class="form-check-label me-2">${market_units[i]}</label></span>`

            }

    var btn = null;
    function ensureBtn() {
      if (!btn) btn = document.getElementById('btnBackToTop');

    }

    function onScroll() {
      var b = ensureBtn();
      if (!b) return;
      var sc = window.scrollY || document.documentElement.scrollTop;

        window.scrollTo({ top: 0, behavior: 'smooth' });
